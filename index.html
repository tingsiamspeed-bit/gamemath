<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกม XO สุดโมเดิร์น</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #38bdf8, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 25px;
            border-radius: 50px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        #status {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 15px;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .cell:active {
            transform: translateY(1px);
        }

        /* ตกแต่งตัว X */
        .cell.x {
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ตกแต่งตัว O */
        .cell.o {
            color: #ec4899;
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.8);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ไฮไลท์ช่องที่ชนะ */
        .cell.winner {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(236, 72, 153, 0.2));
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            animation: pulse 1.5s infinite;
        }

        .reset-btn {
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, #0284c7, #db2777);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.4);
        }

        .reset-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(219, 39, 119, 0.6);
        }

        .reset-btn:active {
            transform: translateY(1px);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @media (max-width: 400px) {
            .cell {
                width: 85px;
                height: 85px;
                font-size: 2.2rem;
            }
            h1 { font-size: 2rem; }
        }
    </style>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <h1>Tic Tac Toe</h1>

    <div class="status-container">
        <div id="status">ตาของคนเล่น: X</div>
    </div>

    <div class="board" id="board">
        <button class="cell" data-cell-index="0"></button>
        <button class="cell" data-cell-index="1"></button>
        <button class="cell" data-cell-index="2"></button>
        <button class="cell" data-cell-index="3"></button>
        <button class="cell" data-cell-index="4"></button>
        <button class="cell" data-cell-index="5"></button>
        <button class="cell" data-cell-index="6"></button>
        <button class="cell" data-cell-index="7"></button>
        <button class="cell" data-cell-index="8"></button>
    </div>

    <button class="reset-btn" id="resetBtn">เริ่มเกมใหม่</button>

    <script>
        const board = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');

        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let isGameActive = true;

        const winningConditions = [, [3, 4, 5], [6, 7, 8], // แนวนอน, [1, 4, 7], [2, 5, 8], // แนวตั้ง, [2, 4, 6]             // แนวทะแยง
        ];

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-cell-index'));

            if (gameState[clickedCellIndex] !== "" || !isGameActive) {
                return;
            }

            updateCell(clickedCell, clickedCellIndex);
            checkResult();
        }

        function updateCell(cell, index) {
            gameState[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
        }

        function changePlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusText.textContent = `ตาของคนเล่น: ${currentPlayer}`;
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]];
                let b = gameState[winCondition[1]];
                let c = gameState[winCondition[2]];

                if (a === '' || b === '' || c === '') {
                    continue;
                }
                if (a === b && b === c) {
                    roundWon = true;
                    winningLine = winCondition;
                    break;
                }
            }

            if (roundWon) {
                statusText.textContent = `ผู้ชนะคือ: ${currentPlayer}! 🎉`;
                statusText.style.color = currentPlayer === 'X' ? '#38bdf8' : '#ec4899';
                isGameActive = false;
                highlightWinner(winningLine);
                return;
            }

            let roundDraw = !gameState.includes("");
            if (roundDraw) {
                statusText.textContent = `เสมอจ้า! 🤝`;
                statusText.style.color = '#ffffff';
                isGameActive = false;
                return;
            }

            changePlayer();
        }

        function highlightWinner(line) {
            line.forEach(index => {
                cells[index].classList.add('winner');
            });
        }

        function restartGame() {
            currentPlayer = 'X';
            gameState = ["", "", "", "", "", "", "", "", ""];
            isGameActive = true;
            statusText.textContent = `ตาของคนเล่น: ${currentPlayer}`;
            statusText.style.color = '#ffffff';
            
            cells.forEach(cell => {
                cell.textContent = "";
                cell.className = 'cell'; // รีเซ็ตคลาสกลับไปเป็นค่าเริ่มต้น
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', restartGame);
    </script>
</body>
</html>
