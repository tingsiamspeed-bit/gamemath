<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมตอบคำถาม ดนตรีไทยและดนตรีสากล ป.5</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        .question-box {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #e8f4fd;
            border-radius: 8px;
            color: #2980b9;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .option-btn {
            padding: 15px;
            font-size: 1.1rem;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background-color: #f8f9fa;
            border-color: #3498db;
        }
        .correct {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
        }
        .incorrect {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            padding: 10px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }
        .btn-blue { background-color: #3498db; }
        .btn-green { background-color: #2ecc71; }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .status {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .score-board {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            text-align: left;
        }
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .player-card {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
        }
        .player-card input {
            width: 40px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>เกมตอบคำถาม ดนตรีไทย & ดนตรีสากล</h1>
    <div class="subtitle">ระดับชั้นประถมศึกษาปีที่ 5 (ผู้เล่น 27 คน)</div>

    <div id="quiz-section">
        <div class="status" id="progress">คำถามที่ 1/10</div>
        <div class="question-box" id="question">ข้อความคำถามจะแสดงที่นี่</div>
        
        <div class="options-grid">
            <button class="option-btn" onclick="checkAnswer(0)" id="opt0">ตัวเลือกที่ 1</button>
            <button class="option-btn" onclick="checkAnswer(1)" id="opt1">ตัวเลือกที่ 2</button>
            <button class="option-btn" onclick="checkAnswer(2)" id="opt2">ตัวเลือกที่ 3</button>
            <button class="option-btn" onclick="checkAnswer(3)" id="opt3">ตัวเลือกที่ 4</button>
        </div>

        <div class="controls">
            <button class="btn btn-green" id="reveal-btn" onclick="revealAnswer()">ดูเฉลย</button>
            <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()" disabled>ข้อถัดไป</button>
        </div>
    </div>

    <!-- บอร์ดคะแนนสำหรับนักเรียน 27 คนให้คุณครูกดบวกคะแนนได้สดๆ -->
    <div class="score-board">
        <h3>กระดานคะแนนนักเรียน (27 คน)</h3>
        <p style="font-size: 0.85rem; color: #7f8c8d;">*คุณครูสามารถกดเครื่องหมาย + เพื่อเพิ่มคะแนนให้เด็กที่ตอบถูกในแต่ละข้อได้ทันที</p>
        <div class="player-grid" id="player-grid">
            <!-- โค้ดส่วนนี้จะสร้างการ์ดผู้เล่น 27 คนอัตโนมัติจาก JavaScript -->
        </div>
    </div>
</div>

<script>
    // ชุดคำถามดนตรี ป.5 จำนวน 10 ข้อ
    const quizData = [
        {
            question: "1. เครื่องดนตรีไทยประเภท 'ดีด' ในข้อใดใช้สายทำมาจากไหมหรือลวด?",
            options: ["ก. ซอด้วง", "ข. จะเข้", "ค. ขลุ่ยเพียงออ", "ง. ระนาดเอก"],
            correct: 1
        },
        {
            question: "2. วงดนตรีไทยประเภทใดที่นิยมใช้บรรเลงในงานศพ?",
            options: ["ก. วงปี่พาทย์นางหงส์", "ข. วงเครื่องสาย", "ค. วงมโหรี", "ง. วงปี่พาทย์เสภา"],
            correct: 0
        },
        {
            question: "3. ข้อใดจัดเป็นเครื่องดนตรีประเภท 'ดำเนินทำนอง' ของดนตรีไทย?",
            options: ["ก. ฉิ่ง", "ข. กลองทัด", "ค. ระนาดเอก", "ง. ตะโพน"],
            correct: 2
        },
        {
            question: "4. เครื่องดนตรีสากลในข้อใดจัดอยู่ในประเภทเครื่องสาย (String Instruments)?",
            options: ["ก. ฟลูต (Flute)", "ข. ไวโอลิน (Violin)", "ค. ทรัมเป็ต (Trumpet)", "ง. กลองสแนร์ (Snare Drum)"],
            correct: 1
        },
        {
            question: "5. เครื่องเป่าลมทองเหลือง (Brass Instruments) ชนิดใดมีเสียงต่ำที่สุด?",
            options: ["ก. ทรัมเป็ต (Trumpet)", "ข. ทรอมโบน (Trombone)", "ค. ทูบา (Tuba)", "ง. เฟรนช์ฮอร์น (French Horn)"],
            correct: 2
        },
        {
            question: "6. เครื่องดนตรีชนิดใดทำหน้าที่ให้จังหวะในวงดนตรีสากล?",
            options: ["ก. แซกโซโฟน", "ข. คลาริเน็ต", "ค. กลองชุด", "ง. เปียโน"],
            correct: 2
        },
        {
            question: "7. เพลงไทยเดิมประเภทใดที่มีความยาวและมีอัตราจังหวะ 3 ชั้น?",
            options: ["ก. เพลงอัตราจังหวะช้า", "ข. เพลงอัตราจังหวะปานกลาง", "ค. เพลงอัตราจังหวะเร็ว", "ง. เพลงหน้าพาทย์"],
            correct: 0
        },
        {
            question: "8. ตัวโน้ตสากลในข้อใดมีอัตราความยาวของเสียงมากที่สุด?",
            options: ["ก. โน้ตตัวกลม", "ข. โน้ตตัวขาว", "ค. โน้ตตัวดำ", "ง. โน้ตตัวเขบ็จ 1 ชั้น"],
            correct: 0
        },
        {
            question: "9. วงออร์เคสตรา (Orchestra) ประกอบด้วยเครื่องดนตรีประเภทใดเป็นหลัก?",
            options: ["ก. เครื่องสาย", "ข. เครื่องเป่าลมไม้", "ค. เครื่องเป่าลมทองเหลือง", "ง. เครื่องกระทบ"],
            correct: 0
        },
        {
            question: "10. เครื่องดนตรีไทยในข้อใดที่ได้รับอิทธิพลมาจากต่างประเทศ?",
            options: ["ก. กลองยาว", "ข. ขิม", "ค. ซอสามสาย", "ง. ปี่ใน"],
            correct: 1
        }
    ];

    let currentQuestion = 0;
    let answered = false;

    // สร้างกระดานคะแนนสำหรับผู้เล่น 27 คน
    const playerGrid = document.getElementById('player-grid');
    for (let i = 1; i <= 27; i++) {
        const card = document.createElement('div');
        card.className = 'player-card';
        card.innerHTML = `
            <div>คนที่ ${i}</div>
            <span id="score-${i}" style="font-weight:bold; color:#27ae60;">0</span> คะแนน<br>
            <button onclick="addPoint(${i})" style="margin-top:5px; cursor:pointer;">+</button>
        `;
        playerGrid.appendChild(card);
    }

    // ฟังก์ชันเพิ่มคะแนนนักเรียน
    function addPoint(id) {
        const scoreSpan = document.getElementById(`score-${id}`);
        let currentScore = parseInt(scoreSpan.innerText);
        scoreSpan.innerText = currentScore + 1;
    }

    // ฟังก์ชันแสดงคำถาม
    function loadQuestion() {
        answered = false;
        document.getElementById('next-btn').disabled = true;
        document.getElementById('reveal-btn').disabled = false;
        
        const q = quizData[currentQuestion];
        document.getElementById('progress').innerText = `คำถามที่ ${currentQuestion + 1}/${quizData.length}`;
        document.getElementById('question').innerText = q.question;
        
        for (let i = 0; i < 4; i++) {
            const btn = document.getElementById(`opt${i}`);
            btn.innerText = q.options[i];
            btn.className = 'option-btn'; // รีเซ็ตสี
        }
    }

    // ฟังก์ชันเมื่อกดเลือกคำตอบ (สำหรับใช้เล่นทีละคน หรือครูคลิกตามเสียงโหวต)
    function checkAnswer(selectedIndex) {
        if (answered) return;
        answered = true;
        
        const correctIndex = quizData[currentQuestion].correct;
        
        if (selectedIndex === correctIndex) {
            document.getElementById(`opt${selectedIndex}`).classList.add('correct');
        } else {
            document.getElementById(`opt${selectedIndex}`).classList.add('incorrect');
            document.getElementById(`opt${correctIndex}`).classList.add('correct');
        }
        
        document.getElementById('next-btn').disabled = false;
    }

    // ฟังก์ชันกดดูเฉลยทันที (กรณีให้นักเรียนเขียนคำตอบลงกระดาษแล้วครูเฉลยพร้อมกันหน้าห้อง)
    function revealAnswer() {
        if (answered) return;
        answered = true;
        const correctIndex = quizData[currentQuestion].correct;
        document.getElementById(`opt${correctIndex}`).classList.add('correct');
        document.getElementById('next-btn').disabled = false;
        document.getElementById('reveal-btn').disabled = true;
    }

    // ฟังก์ชันไปข้อถัดไป
    function nextQuestion() {
        if (currentQuestion < quizData.length - 1) {
